<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Get Your Bonus</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
	<a href="https://wortionsgostpage.com/click">
		<div class="page">
			<div class="back"></div>
			<img class="person" src="person.png" alt="person">
			<div class="shadow"></div>
			
			<div class="logo"></div>

			<div class="btn_container">
				<div class="btn">
					<span class="btn_txt">Get your bonus</span>
				</div>
			</div>

			<div class="txt_top">
				<span class="txt_top_content">
					<span class="percent">100%</span>
					<br class="br_1">
					<span class="bonus">bonus</span>
					<br class="br_2">
					for 
					<br class="br_3">
					your first deposit!
				</span>
			</div>

			<div class="txt_bottom_container">
				<div class="back_txt">
					<div class="back_txt_top"></div>
					<div class="back_txt_bottom"></div>
				</div>
				<div class="txt_bottom">
					<span class="txt_bottom_content">
						<span class="get">Get your</span>
						<br class="br_4">
						<span class="amount">20,000 KES!</span>
					</span>
				</div>
			</div>						

			<div class="steps_container">
				<div class="step step_1">					
					<div class="step_number">1</div>
					<span class="step_txt step_txt_1">Register</span>
				</div>
				<div class="step step_2">					
					<div class="step_number">2</div>
					<span class="step_txt step_txt_2">Make <br class="step_br">a deposit</span>
				</div>
				<div class="step step_3">					
					<div class="step_number">3</div>
					<span class="step_txt step_txt_3">Get <br class="step_br">your bonus</span>
				</div>
			</div>
		</div>
	</a>
	<script>
		function openUrl() {
			document.location.href = "https://wortionsgostpage.com/click"; // url
		}
	</script>
</body>

</html>
